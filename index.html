<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Minimalist To-Do</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Tasks">
    
    <link rel="apple-touch-icon" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'><defs><linearGradient id='bg' x1='0%25' y1='0%25' x2='100%25' y2='100%25'><stop offset='0%25' stop-color='%2306b6d4'/><stop offset='100%25' stop-color='%2310b981'/></linearGradient><filter id='glow'><feDropShadow dx='0' dy='4' stdDeviation='6' flood-color='%23ffffff' flood-opacity='0.4'/></filter></defs><rect width='180' height='180' rx='40' fill='url(%23bg)'/><path d='M55 90 L78 113 L125 65' stroke='white' stroke-width='14' stroke-linecap='round' stroke-linejoin='round' fill='none' filter='url(%23glow)'/></svg>">
    
    <link rel="manifest" href="data:application/manifest+json,{%22name%22:%22Minimalist%20To-Do%22,%22short_name%22:%22Tasks%22,%22start_url%22:%22.%22,%22display%22:%22standalone%22,%22orientation%22:%22portrait%22,%22background_color%22:%22%230b0f19%22,%22theme_color%22:%22%238b5cf6%22,%22icons%22:[{%22src%22:%22data:image/svg+xml;utf8,%3Csvg%20xmlns=%27http://www.w3.org/2000/svg%27%20viewBox=%270%200%20180%20180%27%3E%3Cdefs%3E%3ClinearGradient%20id=%27bg%27%20x1=%270%25%27%20y1=%270%25%27%20x2=%27100%25%27%20y2=%27100%25%27%3E%3Cstop%20offset=%270%25%27%20stop-color=%27%2306b6d4%27/%3E%3Cstop%20offset=%27100%25%27%20stop-color=%27%2310b981%27/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect%20width=%27180%27%20height=%27180%27%20rx=%2740%27%20fill=%27url(%23bg)%27/%3E%3Cpath%20d=%27M55%2090%20L78%20113%20L125%2065%27%20stroke=%27white%27%20stroke-width=%2714%27%20stroke-linecap=%27round%27%20stroke-linejoin=%27round%27%20fill=%27none%27/%3E%3C/svg%3E%22,%22sizes%22:%22180x180%22,%22type%22:%22image/svg+xml%22}]}">

    <style>
        :root {
            --bg-overlay: rgba(11, 15, 25, 0.75);
            --card-bg: rgba(255, 255, 255, 0.08);
            --card-border: rgba(255, 255, 255, 0.12);
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --accent: #8b5cf6;
            --accent-hover: #7c3aed;
            --danger: #ef4444;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-image: url('https://images.unsplash.com/photo-1506318137071-a8e063b4bec0?auto=format&fit=crop&w=1200&q=80');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: var(--text-main);
            margin: 0;
            padding: 16px;
            display: flex;
            justify-content: center;
            overscroll-behavior: none;
            min-height: 100vh;
            box-sizing: border-box;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: var(--bg-overlay);
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 600px;
            background: var(--card-bg);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            padding: 20px;
            border-radius: 16px;
            border: 1px solid var(--card-border);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            padding-top: calc(env(safe-area-inset-top) + 20px);
            align-self: flex-start;
            box-sizing: border-box;
        }

        h1 {
            font-size: 26px;
            margin-top: 0;
            margin-bottom: 20px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        /* HARD FORCED VERTICAL BLOCK STACKING FOR INPUT FIELDS */
        .input-block {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 24px;
            width: 100%;
        }

        .input-row {
            display: flex;
            flex-direction: column; /* Force stack input field over date field on mobile screens */
            gap: 12px;
            width: 100%;
        }

        input[type="text"], input[type="date"] {
            padding: 14px;
            border: 1px solid var(--card-border);
            border-radius: 10px;
            font-size: 16px;
            outline: none;
            -webkit-appearance: none;
            background-color: rgba(0, 0, 0, 0.4);
            color: var(--text-main);
            box-sizing: border-box;
            width: 100% !important; /* Force true 100% screen width expansion */
        }

        input[type="text"]:focus, input[type="date"]:focus {
            border-color: var(--accent);
            background-color: rgba(0, 0, 0, 0.6);
        }

        .btn-add-main {
            width: 100%;
            background-color: var(--accent);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            box-shadow: 0 4px 12px rgba(139, 92, 246, 0.3);
            box-sizing: border-box;
        }

        .task-list {
            list-style: none;
            padding: 0;
            margin: 0;
            width: 100%;
        }

        .task-item {
            margin-bottom: 14px;
            border: 1px solid var(--card-border);
            border-radius: 12px;
            padding: 14px;
            background: rgba(0, 0, 0, 0.25);
            box-sizing: border-box;
        }

        /* FORCED STACKING FOR TASK ROW IF DISPLAY SPACE IS SQUEEZED */
        .task-main-row {
            display: flex;
            flex-direction: column; /* Stacks text block vertically above action buttons */
            gap: 12px;
            align-items: flex-start;
            width: 100%;
        }

        /* Desktop/larger screens scale back up */
        @media (min-width: 480px) {
            .input-row { flex-direction: row; }
            input[type="date"] { width: 160px !important; }
            .task-main-row { flex-direction: row; align-items: center; justify-content: space-between; }
        }

        .task-content {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            width: 100%;
        }

        .task-text-container {
            display: flex;
            flex-direction: column;
            flex: 1;
        }

        .task-text {
            font-size: 16px;
            word-break: break-word;
            line-height: 1.4;
        }

        .task-date-badge {
            font-size: 12px;
            color: #a78bfa;
            margin-top: 4px;
            font-weight: 500;
        }

        .completed .task-text, .completed .task-date-badge {
            text-decoration: line-through;
            color: var(--text-muted);
            opacity: 0.5;
        }

        .actions {
            display: flex;
            gap: 8px;
            width: 100%;
            justify-content: flex-end; /* Push buttons to right inside block rows */
        }

        .btn-sm {
            padding: 8px 14px;
            font-size: 13px;
            border-radius: 8px;
            background-color: rgba(255, 255, 255, 0.06);
            color: var(--text-main);
            border: 1px solid var(--card-border);
        }

        .btn-delete:hover {
            background-color: rgba(239, 68, 68, 0.2);
            color: var(--danger);
            border-color: rgba(239, 68, 68, 0.4);
        }

        .subtask-list {
            list-style: none;
            margin: 14px 0 0 16px;
            padding: 0;
            border-left: 2px solid rgba(255, 255, 255, 0.1);
            padding-left: 12px;
            width: calc(100% - 16px);
        }

        .subtask-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: 12px;
            gap: 10px;
        }

        .subtask-input-row {
            margin-top: 12px;
            margin-left: 16px;
            display: flex;
            gap: 8px;
        }

        input[type="checkbox"] {
            width: 22px;
            height: 22px;
            cursor: pointer;
            accent-color: var(--accent);
            flex-shrink: 0; /* Prevents checkbox from flattening */
            margin-top: 2px;
        }
        
        .notification-btn {
            background-color: rgba(255, 255, 255, 0.1);
            font-size: 13px;
            padding: 10px;
            margin-bottom: 18px;
            border-radius: 8px;
            display: none;
            width: 100%;
            border: 1px solid var(--card-border);
            color: white;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>My Tasks</h1>
    <button id="enableNotifications" class="notification-btn" onclick="requestNotificationPermission()">🔔 Enable Task Reminders (10:30 AM)</button>
    
    <div class="input-block">
        <div class="input-row">
            <input type="text" id="mainTaskInput" placeholder="Add a new main task..." onkeydown="if(event.key === 'Enter') addMainTask()">
            <input type="date" id="mainTaskDate">
        </div>
        <button class="btn-add-main" onclick="addMainTask()">Add Task</button>
    </div>

    <ul id="taskList" class="task-list"></ul>
</div>

<script>
    let tasks = JSON.parse(localStorage.getItem('todo_tasks')) || [];

    if ('Notification' in window && Notification.permission !== 'granted') {
        document.getElementById('enableNotifications').style.display = 'block';
    }

    function requestNotificationPermission() {
        if ('Notification' in window) {
            Notification.requestPermission().then(permission => {
                if (permission === 'granted') {
                    document.getElementById('enableNotifications').style.display = 'none';
                }
            });
        }
    }

    function saveTasks() {
        localStorage.setItem('todo_tasks', JSON.stringify(tasks));
        renderTasks();
    }

    function addMainTask() {
        const input = document.getElementById('mainTaskInput');
        const dateInput = document.getElementById('mainTaskDate');
        const text = input.value.trim();
        const dueDate = dateInput.value;

        if (!text) return;

        tasks.push({
            id: Date.now().toString(),
            text: text,
            completed: false,
            dueDate: dueDate || null,
            alarmTriggered: false,
            subtasks: [],
            showSubtaskInput: false
        });

        input.value = '';
        dateInput.value = '';
        saveTasks();
        
        if ('Notification' in window && Notification.permission === 'default') {
            requestNotificationPermission();
        }
    }

    function toggleMainTask(id) {
        tasks = tasks.map(task => {
            if (task.id === id) {
                const newStatus = !task.completed;
                const updatedSubtasks = task.subtasks.map(st => ({ ...st, completed: newStatus }));
                return { ...task, completed: newStatus, subtasks: updatedSubtasks };
            }
            return task;
        });
        saveTasks();
    }

    function deleteMainTask(id) {
        tasks = tasks.filter(task => task.id !== id);
        saveTasks();
    }

    function toggleSubtaskInput(id) {
        tasks = tasks.map(task => 
            task.id === id ? { ...task, showSubtaskInput: !task.showSubtaskInput } : task
        );
        renderTasks();
    }

    function addSubtask(mainTaskId, inputId) {
        const input = document.getElementById(inputId);
        const text = input.value.trim();
        if (!text) return;

        tasks = tasks.map(task => {
            if (task.id === mainTaskId) {
                return {
                    ...task,
                    subtasks: [...task.subtasks, { id: Date.now().toString(), text: text, completed: false }]
                };
            }
            return task;
        });

        saveTasks();
    }

    // Toggle sub task checkbox mapping logic
    function toggleSubtask(mainTaskId, subtaskId) {
        tasks = tasks.map(task => {
            if (task.id === mainTaskId) {
                const updatedSubtasks = task.subtasks.map(st => 
                    st.id === subtaskId ? { ...st, completed: !st.completed } : st
                );
                return { ...task, subtasks: updatedSubtasks };
            }
            return task;
        });
        saveTasks();
    }

    function deleteSubtask(mainTaskId, subtaskId) {
        tasks = tasks.map(task => {
            if (task.id === mainTaskId) {
                return { ...task, subtasks: task.subtasks.filter(st => st.id !== subtaskId) };
            }
            return task;
        });
        saveTasks();
    }

    function formatDateDisplay(dateString) {
        if (!dateString) return '';
        const parts = dateString.split('-');
        const date = new Date(parts[0], parts[1] - 1, parts[2]);
        return date.toLocaleDateString(undefined, { month: 'short', day: 'numeric', year: 'numeric' });
    }

    function renderTasks() {
        const listEl = document.getElementById('taskList');
        listEl.innerHTML = '';

        tasks.forEach(task => {
            const itemLi = document.createElement('li');
            itemLi.className = `task-item ${task.completed ? 'completed' : ''}`;

            const dateDisplay = task.dueDate ? `<span class="task-date-badge">⏰ Due: ${formatDateDisplay(task.dueDate)} at 10:30 AM</span>` : '';

            let html = `
                <div class="task-main-row">
                    <div class="task-content">
                        <input type="checkbox" ${task.completed ? 'checked' : ''} onclick="toggleMainTask('${task.id}')">
                        <div class="task-text-container">
                            <span class="task-text">${task.text}</span>
                            ${dateDisplay}
                        </div>
                    </div>
                    <div class="actions">
                        <button class="btn-sm" onclick="toggleSubtaskInput('${task.id}')">+ Subtask</button>
                        <button class="btn-sm btn-delete" onclick="deleteMainTask('${task.id}')">Delete</button>
                    </div>
                </div>
            `;

            if (task.subtasks.length > 0) {
                html += `<ul class="subtask-list">`;
                task.subtasks.forEach(subtask => {
                    html += `
                        <li class="subtask-item ${subtask.completed ? 'completed' : ''}">
                            <div class="task-content">
                                <input type="checkbox" ${subtask.completed ? 'checked' : ''} onclick="toggleSubtask('${task.id}', '${subtask.id}')">
                                <span class="task-text" style="font-size: 14px;">${subtask.text}</span>
                            </div>
                            <button class="btn-sm btn-delete" style="padding: 2px 6px; font-size: 11px;" onclick="deleteSubtask('${task.id}', '${subtask.id}')">✕</button>
                        </li>
                    `;
                });
                html += `</ul>`;
            }

            if (task.showSubtaskInput) {
                const inputId = `subInput-${task.id}`;
                html += `
                    <div class="subtask-input-row">
                        <input type="text" id="${inputId}" placeholder="Add subtask..." onkeydown="if(event.key === 'Enter') addSubtask('${task.id}', '${inputId}')">
                        <button class="btn-sm" onclick="addSubtask('${task.id}', '${inputId}')">Add</button>
                    </div>
                `;
            }

            itemLi.innerHTML = html;
            listEl.appendChild(itemLi);
        });
    }

    function checkAlarms() {
        if (!('Notification' in window) || Notification.permission !== 'granted') return;

        const now = new Date();
        
        tasks.forEach(task => {
            if (task.dueDate && !task.completed && !task.alarmTriggered) {
                const parts = task.dueDate.split('-');
                const alarmTime = new Date(parts[0], parts[1] - 1, parts[2], 10, 30, 0);

                if (now >= alarmTime) {
                    new Notification("Task Reminder!", {
                        body: `"${task.text}" is due today!`,
                        icon: 'data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="%238b5cf6"><circle cx="12" cy="12" r="10"/></svg>'
                    });
                    
                    task.alarmTriggered = true;
                    localStorage.setItem('todo_tasks', JSON.stringify(tasks));
                }
            }
        });
    }

    setInterval(checkAlarms, 15000);
    renderTasks();

    if ('serviceWorker' in navigator) {
        const swCode = `self.addEventListener('fetch', function(e) { e.respondWith(fetch(e.request)); });`;
        const blob = new Blob([swCode], {type: 'application/javascript'});
        navigator.serviceWorker.register(URL.createObjectURL(blob));
    }
</script>

</body>
</html>
