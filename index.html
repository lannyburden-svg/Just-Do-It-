<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Minimalist To-Do</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="My Tasks">
    
    <link rel="manifest" href="data:application/manifest+json,{%22name%22:%22Minimalist%20To-Do%22,%22short_name%22:%22Tasks%22,%22start_url%22:%22.%22,%22display%22:%22standalone%22,%22background_color%22:%22%23f8f9fa%22,%22theme_color%22:%22%234f46e5%22}">

    <style>
        :root {
            --bg-color: #f8f9fa;
            --card-bg: #ffffff;
            --text-main: #212529;
            --text-muted: #6c757d;
            --accent: #4f46e5;
            --accent-hover: #4338ca;
            --border: #e9ecef;
            --danger: #dc3545;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            overscroll-behavior: none; 
        }

        .container {
            width: 100%;
            max-width: 600px;
            background: var(--card-bg);
            padding: 24px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            padding-top: calc(env(safe-area-inset-top) + 20px);
        }

        h1 {
            font-size: 24px;
            margin-top: 0;
            margin-bottom: 20px;
            font-weight: 700;
        }

        .input-block {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 24px;
        }

        .input-row {
            display: flex;
            gap: 10px;
        }

        input[type="text"], input[type="date"] {
            padding: 12px 16px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 16px;
            outline: none;
            -webkit-appearance: none;
            background-color: var(--card-bg);
            color: var(--text-main);
        }

        input[type="text"] {
            flex: 1;
        }

        input[type="date"] {
            width: 160px;
            font-family: inherit;
        }

        button {
            background-color: var(--accent);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }

        .task-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .task-item {
            margin-bottom: 12px;
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 14px;
            background: var(--card-bg);
        }

        .task-main-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }

        .task-content {
            display: flex;
            align-items: center;
            gap: 12px;
            flex: 1;
        }

        .task-text-container {
            display: flex;
            flex-direction: column;
        }

        .task-text {
            font-size: 16px;
            word-break: break-word;
        }

        .task-date-badge {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 2px;
        }

        .completed .task-text, .completed .task-date-badge {
            text-decoration: line-through;
            color: var(--text-muted);
        }

        .actions {
            display: flex;
            gap: 8px;
        }

        .btn-sm {
            padding: 6px 10px;
            font-size: 12px;
            border-radius: 6px;
            background-color: transparent;
            color: var(--text-muted);
            border: 1px solid var(--border);
        }

        .btn-delete:hover {
            background-color: #f8d7da;
            color: var(--danger);
            border-color: #f5c2c7;
        }

        .subtask-list {
            list-style: none;
            margin: 12px 0 0 24px;
            padding: 0;
            border-left: 2px solid var(--border);
            padding-left: 14px;
        }

        .subtask-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: 10px;
        }

        .subtask-input-row {
            margin-top: 12px;
            margin-left: 24px;
            display: flex;
            gap: 8px;
        }

        .subtask-input-row input {
            padding: 8px 12px;
            font-size: 14px;
        }

        input[type="checkbox"] {
            width: 20px;
            height: 20px;
            cursor: pointer;
            accent-color: var(--accent);
        }
        
        .notification-btn {
            background-color: #6c757d;
            font-size: 12px;
            padding: 6px 12px;
            margin-bottom: 15px;
            border-radius: 4px;
            display: none;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>My Tasks</h1>
    <button id="enableNotifications" class="notification-btn" onclick="requestNotificationPermission()">🔔 Enable Task Reminders</button>
    
    <div class="input-block">
        <div class="input-row">
            <input type="text" id="mainTaskInput" placeholder="Add a new main task..." onkeydown="if(event.key === 'Enter') addMainTask()">
            <input type="date" id="mainTaskDate">
        </div>
        <button onclick="addMainTask()" style="width: 100%;">Add Task</button>
    </div>

    <ul id="taskList" class="task-list"></ul>
</div>

<script>
    let tasks = JSON.parse(localStorage.getItem('todo_tasks')) || [];

    // Initialize notification button display status
    if ('Notification' in window && Notification.permission !== 'granted') {
        document.getElementById('enableNotifications').style.display = 'inline-block';
    }

    function requestNotificationPermission() {
        if ('Notification' in window) {
            Notification.requestPermission().then(permission => {
                if (permission === 'granted') {
                    document.getElementById('enableNotifications').style.display = 'none';
                    alert('Alarms enabled! You will be notified at 10:30 AM on task due dates.');
                }
            });
        }
    }

    function saveTasks() {
        localStorage.setItem('todo_tasks', JSON.stringify(tasks));
        renderTasks();
    }

    function addMainTask() {
        const input = document.getElementById('mainTaskInput');
        const dateInput = document.getElementById('mainTaskDate');
        const text = input.value.trim();
        const dueDate = dateInput.value; // Format: YYYY-MM-DD

        if (!text) return;

        tasks.push({
            id: Date.now().toString(),
            text: text,
            completed: false,
            dueDate: dueDate || null,
            alarmTriggered: false,
            subtasks: [],
            showSubtaskInput: false
        });

        input.value = '';
        dateInput.value = '';
        saveTasks();
        
        // Request notification permission if they haven't explicitly chosen yet
        if ('Notification' in window && Notification.permission === 'default') {
            requestNotificationPermission();
        }
    }

    function toggleMainTask(id) {
        tasks = tasks.map(task => {
            if (task.id === id) {
                const newStatus = !task.completed;
                const updatedSubtasks = task.subtasks.map(st => ({ ...st, completed: newStatus }));
                return { ...task, completed: newStatus, subtasks: updatedSubtasks };
            }
            return task;
        });
        saveTasks();
    }

    function deleteMainTask(id) {
        tasks = tasks.filter(task => task.id !== id);
        saveTasks();
    }

    function toggleSubtaskInput(id) {
        tasks = tasks.map(task => 
            task.id === id ? { ...task, showSubtaskInput: !task.showSubtaskInput } : task
        );
        renderTasks();
    }

    function addSubtask(mainTaskId, inputId) {
        const input = document.getElementById(inputId);
        const text = input.value.trim();
        if (!text) return;

        tasks = tasks.map(task => {
            if (task.id === mainTaskId) {
                return {
                    ...task,
                    subtasks: [...task.subtasks, { id: Date.now().toString(), text: text, completed: false }]
                };
            }
            return task;
        });

        saveTasks();
    }

    function toggleSubtask(mainTaskId, subtaskId) {
        tasks = tasks.map(task => {
            if (task.id === mainTaskId) {
                const updatedSubtasks = task.subtasks.map(st => 
                    st.id === subtaskId ? { ...st, completed: !st.completed } : st
                );
                return { ...task, subtasks: updatedSubtasks };
            }
            return task;
        });
        saveTasks();
    }

    function deleteSubtask(mainTaskId, subtaskId) {
        tasks = tasks.map(task => {
            if (task.id === mainTaskId) {
                return { ...task, subtasks: task.subtasks.filter(st => st.id !== subtaskId) };
            }
            return task;
        });
        saveTasks();
    }

    function formatDateDisplay(dateString) {
        if (!dateString) return '';
        const parts = dateString.split('-');
        const date = new Date(parts[0], parts[1] - 1, parts[2]);
        return date.toLocaleDateString(undefined, { month: 'short', day: 'numeric', year: 'numeric' });
    }

    function renderTasks() {
        const listEl = document.getElementById('taskList');
        listEl.innerHTML = '';

        tasks.forEach(task => {
            const itemLi = document.createElement('li');
            itemLi.className = `task-item ${task.completed ? 'completed' : ''}`;

            const dateDisplay = task.dueDate ? `<span class="task-date-badge">📅 Due: ${formatDateDisplay(task.dueDate)} (Alarm 10:30 AM)</span>` : '';

            let html = `
                <div class="task-main-row">
                    <div class="task-content">
                        <input type="checkbox" ${task.completed ? 'checked' : ''} onclick="toggleMainTask('${task.id}')">
                        <div class="task-text-container">
                            <span class="task-text">${task.text}</span>
                            ${dateDisplay}
                        </div>
                    </div>
                    <div class="actions">
                        <button class="btn-sm" onclick="toggleSubtaskInput('${task.id}')">+ Subtask</button>
                        <button class="btn-sm btn-delete" onclick="deleteMainTask('${task.id}')">Delete</button>
                    </div>
                </div>
            `;

            if (task.subtasks.length > 0) {
                html += `<ul class="subtask-list">`;
                task.subtasks.forEach(subtask => {
                    html += `
                        <li class="subtask-item ${subtask.completed ? 'completed' : ''}">
                            <div class="task-content">
                                <input type="checkbox" ${subtask.completed ? 'checked' : ''} onclick="toggleSubtask('${task.id}', '${subtask.id}')">
                                <span class="task-text" style="font-size: 14px;">${subtask.text}</span>
                            </div>
                            <button class="btn-sm btn-delete" style="padding: 2px 6px; font-size: 11px;" onclick="deleteSubtask('${task.id}', '${subtask.id}')">✕</button>
                        </li>
                    `;
                });
                html += `</ul>`;
            }

            if (task.showSubtaskInput) {
                const inputId = `subInput-${task.id}`;
                html += `
                    <div class="subtask-input-row">
                        <input type="text" id="${inputId}" placeholder="Add subtask..." onkeydown="if(event.key === 'Enter') addSubtask('${task.id}', '${inputId}')">
                        <button onclick="addSubtask('${task.id}', '${inputId}')">Add</button>
                    </div>
                `;
            }

            itemLi.innerHTML = html;
            listEl.appendChild(itemLi);
        });
    }

    // Alarm Background Checker Engine
    function checkAlarms() {
        if (!('Notification' in window) || Notification.permission !== 'granted') return;

        const now = new Date();
        
        tasks.forEach(task => {
            if (task.dueDate && !task.completed && !task.alarmTriggered) {
                // Parse due date parts
                const parts = task.dueDate.split('-');
                // Create a target date object specifically forced to 10:30:00 AM local time
                const alarmTime = new Date(parts[0], parts[1] - 1, parts[2], 10, 30, 0);

                // If current time matches or has passed 10:30 AM on that specific day
                if (now >= alarmTime) {
                    new Notification("Task Reminder!", {
                        body: `"${task.text}" is due today!`,
                        icon: 'data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="%234f46e5"><circle cx="12" cy="12" r="10"/></svg>'
                    });
                    
                    task.alarmTriggered = true; // Avoid double triggering
                    localStorage.setItem('todo_tasks', JSON.stringify(tasks));
                }
            }
        });
    }

    // Run the background check loop every 15 seconds to look for due matches
    setInterval(checkAlarms, 15000);

    renderTasks();

    // Inline minimal Service Worker registration to enable iOS standalone mode
    if ('serviceWorker' in navigator) {
        const swCode = `self.addEventListener('fetch', function(e) { e.respondWith(fetch(e.request)); });`;
        const blob = new Blob([swCode], {type: 'application/javascript'});
        navigator.serviceWorker.register(URL.createObjectURL(blob));
    }
</script>

</body>
</html>
